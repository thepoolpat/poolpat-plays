name: Fetch Data (weekly)

# Combined replacement for fetch-plays.yml + fetch-playlists.yml.
# Runs both fetchers sequentially in one job to avoid the SPOTIFY_REFRESH_TOKEN
# rotation race that hit when they were two separate workflows 30 min apart.

on:
  schedule:
    - cron: "0 6 * * 0"   # Sundays 06:00 UTC
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  issues: write

concurrency:
  group: spotify-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Fetch play counts
        id: fetch_plays
        continue-on-error: true
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          APPLE_MUSIC_TOKEN:     ${{ secrets.APPLE_MUSIC_TOKEN }}
          GH_TOKEN:              ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:     ${{ github.repository }}
        run: python pipeline/fetch_plays.py

      - name: Fetch playlist data
        id: fetch_playlists
        continue-on-error: true
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          RAPIDAPI_KEY:          ${{ secrets.RAPIDAPI_KEY }}
          GH_TOKEN:              ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY:     ${{ github.repository }}
        run: python pipeline/fetch_playlists.py

      - name: Commit data updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes to commit"
          else
            git commit -m "data: weekly update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Fail if both fetches failed
        if: steps.fetch_plays.outcome == 'failure' && steps.fetch_playlists.outcome == 'failure'
        run: |
          echo "::error::Both fetches failed — likely a credential issue (Spotify revoked?)"
          exit 1

      - name: Warn on partial failure
        if: ${{ (steps.fetch_plays.outcome == 'failure') != (steps.fetch_playlists.outcome == 'failure') }}
        run: |
          echo "::warning::One of the fetches failed — check logs above"
